version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: humanizator
      POSTGRES_PASSWORD: humanizator
      POSTGRES_DB: humanizator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humanizator -d humanizator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://humanizator:humanizator@db:5432/humanizator
      - DATABASE_URL_SYNC=postgresql://humanizator:humanizator@db:5432/humanizator
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "celery -A async_tasks.celery_app worker --loglevel=info"
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - ./pyproject.toml:/app/pyproject.toml
    environment:
      - DATABASE_URL=postgresql+asyncpg://humanizator:humanizator@db:5432/humanizator
      - DATABASE_URL_SYNC=postgresql://humanizator:humanizator@db:5432/humanizator
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
