version: "3.9"

# Staging environment — mirrors production, but with relaxed resource limits.
# Usage: docker compose -f docker-compose.staging.yml up
#
# Required env vars (set in .env.staging or CI secrets):
#   DATABASE_URL, REDIS_URL, OPENAI_API_KEY, JWT_SECRET_KEY

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-humanizator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-humanizator}
      POSTGRES_DB: ${POSTGRES_DB:-humanizator_staging}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-humanizator}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2"
    working_dir: /app/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-humanizator}:${POSTGRES_PASSWORD:-humanizator}@db:5432/${POSTGRES_DB:-humanizator_staging}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-humanizator}:${POSTGRES_PASSWORD:-humanizator}@db:5432/${POSTGRES_DB:-humanizator_staging}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APP_ENV=staging
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "celery -A async_tasks.celery_app worker --loglevel=info --concurrency=2"
    working_dir: /app/backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-humanizator}:${POSTGRES_PASSWORD:-humanizator}@db:5432/${POSTGRES_DB:-humanizator_staging}
      - DATABASE_URL_SYNC=postgresql://${POSTGRES_USER:-humanizator}:${POSTGRES_PASSWORD:-humanizator}@db:5432/${POSTGRES_DB:-humanizator_staging}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APP_ENV=staging
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  staging_postgres_data:
